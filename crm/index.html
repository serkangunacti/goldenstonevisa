<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoldstoneVisa CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC4y2kL2HV133HFzb0Ih3nxswBofBdYLd0",
      authDomain: "goldstonevisa.firebaseapp.com",
      projectId: "goldstonevisa",
      storageBucket: "goldstonevisa.firebasestorage.app",
      messagingSenderId: "248989036145",
      appId: "1:248989036145:web:aa9ed9c89d18d6a16cf5d0",
      measurementId: "G-WSZKKHECWQ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.firebaseDB = db;
    window.firebaseFns = { collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: linear-gradient(135deg, #F0F4FF 0%, #FAFBFF 50%, #F5F0FF 100%); min-height: 100vh; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    select, input, button { font-family: 'DM Sans', sans-serif; }
    table { width: 100%; border-collapse: collapse; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const DROPDOWN_OPTIONS = {
      musteriTuru: ["Bireysel", "Ticari"],
      vizeTuru: ["Schengen", "Ticari", "Turistik", "AB Dışı"],
      vizeUlke: ["Almanya", "Fransa", "Hollanda", "İspanya", "Bulgaristan", "Yunanistan", "Amerika", "İngiltere", "Avusturalya"],
      botKullanimi: ["Evet", "Hayır"],
      surec: ["Yeni", "Devam Ediyor", "Olumlu", "Olumsuz"],
      odemeBilgisi: ["Ödendi", "Bekliyor", "Kısmi Ödeme"],
    };

    const EMPTY_CUSTOMER = {
      musteriAdi: "", musteriTuru: "", vizeTuru: "", vizeUlke: "",
      botKullanimi: "", botBedeli: "", surec: "", odemeBilgisi: "", odemeTutari: "",
    };

    const SUREC_COLORS = {
      "Yeni": { bg: "#E0F2FE", text: "#0369A1", border: "#7DD3FC" },
      "Devam Ediyor": { bg: "#FEF3C7", text: "#92400E", border: "#FCD34D" },
      "Olumlu": { bg: "#D1FAE5", text: "#065F46", border: "#6EE7B7" },
      "Olumsuz": { bg: "#FEE2E2", text: "#991B1B", border: "#FCA5A5" },
    };

    function Badge({ value, colorMap }) {
      const c = colorMap[value];
      if (!c || !value) return <span style={{ color: "#94A3B8" }}>—</span>;
      return (
        <span style={{
          background: c.bg, color: c.text, border: `1px solid ${c.border}`,
          padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600, whiteSpace: "nowrap"
        }}>{value}</span>
      );
    }

    function SelectField({ label, value, options, onChange, icon }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", letterSpacing: 0.5, textTransform: "uppercase" }}>
            {icon && <span style={{ marginRight: 4 }}>{icon}</span>}{label}
          </label>
          <select value={value} onChange={e => onChange(e.target.value)} style={{
            padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E2E8F0",
            background: "#F8FAFC", fontSize: 14, color: value ? "#1E293B" : "#94A3B8",
            outline: "none", cursor: "pointer", transition: "border 0.2s"
          }}
            onFocus={e => e.target.style.borderColor = "#6366F1"}
            onBlur={e => e.target.style.borderColor = "#E2E8F0"}
          >
            <option value="">Seçiniz...</option>
            {options.map(o => <option key={o} value={o}>{o}</option>)}
          </select>
        </div>
      );
    }

    function InputField({ label, value, onChange, type = "text", placeholder, icon }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "#64748B", letterSpacing: 0.5, textTransform: "uppercase" }}>
            {icon && <span style={{ marginRight: 4 }}>{icon}</span>}{label}
          </label>
          <input type={type} value={value} onChange={e => onChange(e.target.value)}
            placeholder={placeholder || ""}
            style={{
              padding: "10px 12px", borderRadius: 10, border: "1.5px solid #E2E8F0",
              background: "#F8FAFC", fontSize: 14, color: "#1E293B", outline: "none",
              transition: "border 0.2s", width: "100%"
            }}
            onFocus={e => e.target.style.borderColor = "#6366F1"}
            onBlur={e => e.target.style.borderColor = "#E2E8F0"}
          />
        </div>
      );
    }

    function StatCard({ label, value, icon, color }) {
      return (
        <div style={{
          background: "#fff", borderRadius: 16, padding: "20px 24px",
          boxShadow: "0 1px 3px rgba(0,0,0,0.04)", border: "1px solid #F1F5F9",
          display: "flex", alignItems: "center", gap: 16, flex: 1, minWidth: 160,
        }}>
          <div style={{
            width: 44, height: 44, borderRadius: 12, background: color + "18",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20
          }}>{icon}</div>
          <div>
            <div style={{ fontSize: 24, fontWeight: 700, color: "#1E293B", fontFamily: "'Playfair Display', serif" }}>{value}</div>
            <div style={{ fontSize: 12, color: "#94A3B8", fontWeight: 500, marginTop: 2 }}>{label}</div>
          </div>
        </div>
      );
    }

    function Spinner() {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 80, gap: 16 }}>
          <div style={{
            width: 40, height: 40, border: "3px solid #E2E8F0", borderTopColor: "#6366F1",
            borderRadius: "50%", animation: "spin 0.8s linear infinite"
          }} />
          <span style={{ color: "#64748B", fontSize: 14 }}>Firebase'e bağlanılıyor...</span>
        </div>
      );
    }

    function Toast({ message, type, onClose }) {
      useEffect(() => {
        const t = setTimeout(onClose, 3000);
        return () => clearTimeout(t);
      }, []);
      const bg = type === "success" ? "#10B981" : type === "error" ? "#EF4444" : "#6366F1";
      return (
        <div style={{
          position: "fixed", top: 20, right: 20, zIndex: 9999,
          background: bg, color: "#fff", padding: "12px 24px", borderRadius: 12,
          boxShadow: "0 4px 20px rgba(0,0,0,0.15)", fontSize: 14, fontWeight: 600,
          animation: "slideDown 0.3s ease", display: "flex", alignItems: "center", gap: 8
        }}>
          {type === "success" ? "✅" : type === "error" ? "❌" : "ℹ️"} {message}
        </div>
      );
    }

    function CRMApp() {
      const [customers, setCustomers] = useState([]);
      const [form, setForm] = useState({ ...EMPTY_CUSTOMER });
      const [showForm, setShowForm] = useState(false);
      const [editId, setEditId] = useState(null);
      const [search, setSearch] = useState("");
      const [filterSurec, setFilterSurec] = useState("");
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [toast, setToast] = useState(null);
      const formRef = useRef(null);
      const dbRef = useRef(null);
      const fnsRef = useRef(null);

      const showToast = (message, type = "success") => setToast({ message, type });

      useEffect(() => {
        const init = () => {
          if (window.firebaseDB && window.firebaseFns) {
            dbRef.current = window.firebaseDB;
            fnsRef.current = window.firebaseFns;
            const { collection, onSnapshot, query, orderBy } = fnsRef.current;
            const q = query(collection(dbRef.current, "musteriler"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
              const data = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
              setCustomers(data);
              setLoading(false);
            }, (err) => {
              console.error("Firestore error:", err);
              showToast("Veritabanı bağlantı hatası!", "error");
              setLoading(false);
            });
          } else {
            window.addEventListener('firebase-ready', init, { once: true });
          }
        };
        init();
      }, []);

      const updateForm = (key, val) => setForm(prev => ({ ...prev, [key]: val }));

      const handleSave = async () => {
        if (!form.musteriAdi.trim()) { showToast("Lütfen müşteri adı giriniz.", "error"); return; }
        setSaving(true);
        try {
          const { collection, addDoc, updateDoc, doc, serverTimestamp } = fnsRef.current;
          const data = {
            musteriAdi: form.musteriAdi,
            musteriTuru: form.musteriTuru,
            vizeTuru: form.vizeTuru,
            vizeUlke: form.vizeUlke,
            botKullanimi: form.botKullanimi,
            botBedeli: form.botBedeli,
            surec: form.surec,
            odemeBilgisi: form.odemeBilgisi,
            odemeTutari: form.odemeTutari,
            updatedAt: serverTimestamp()
          };
          if (editId) {
            await updateDoc(doc(dbRef.current, "musteriler", editId), data);
            showToast("Müşteri güncellendi!");
          } else {
            data.createdAt = serverTimestamp();
            await addDoc(collection(dbRef.current, "musteriler"), data);
            showToast("Yeni müşteri eklendi!");
          }
          setForm({ ...EMPTY_CUSTOMER });
          setShowForm(false);
          setEditId(null);
        } catch (err) {
          console.error("Save error:", err);
          showToast("Kaydetme hatası: " + err.message, "error");
        }
        setSaving(false);
      };

      const handleEdit = (customer) => {
        setForm({
          musteriAdi: customer.musteriAdi || "",
          musteriTuru: customer.musteriTuru || "",
          vizeTuru: customer.vizeTuru || "",
          vizeUlke: customer.vizeUlke || "",
          botKullanimi: customer.botKullanimi || "",
          botBedeli: customer.botBedeli || "",
          surec: customer.surec || "",
          odemeBilgisi: customer.odemeBilgisi || "",
          odemeTutari: customer.odemeTutari || "",
        });
        setEditId(customer.id);
        setShowForm(true);
        setTimeout(() => formRef.current?.scrollIntoView({ behavior: "smooth" }), 100);
      };

      const handleDelete = async (id) => {
        if (!confirm("Bu müşteriyi silmek istediğinize emin misiniz?")) return;
        try {
          const { deleteDoc, doc } = fnsRef.current;
          await deleteDoc(doc(dbRef.current, "musteriler", id));
          showToast("Müşteri silindi!");
        } catch (err) {
          showToast("Silme hatası: " + err.message, "error");
        }
      };

      const handleExportExcel = () => {
        const headers = ["Müşteri Adı", "Müşteri Türü", "Vize Türü", "Vize Alınacak Ülke", "Bot Kullanılacak mı?", "Bot Bedeli", "Süreç", "Ödeme Bilgisi", "Ödeme Tutarı"];
        const rows = customers.map(c => [
          c.musteriAdi, c.musteriTuru, c.vizeTuru, c.vizeUlke,
          c.botKullanimi, c.botBedeli ? Number(c.botBedeli) : "", c.surec,
          c.odemeBilgisi, c.odemeTutari ? Number(c.odemeTutari) : ""
        ]);
        const wsData = [headers, ...rows];
        const ws = XLSX.utils.aoa_to_sheet(wsData);
        ws['!cols'] = [
          { wch: 22 }, { wch: 14 }, { wch: 14 }, { wch: 20 },
          { wch: 20 }, { wch: 12 }, { wch: 16 }, { wch: 16 }, { wch: 14 }
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Müşteriler");
        const today = new Date();
        const dateStr = today.toISOString().slice(0, 10).replace(/-/g, "");
        XLSX.writeFile(wb, `GoldstoneVisa_CRM_${dateStr}.xlsx`);
        showToast("Excel dosyası indirildi!");
      };

      const filtered = customers.filter(c => {
        const matchSearch = !search || (c.musteriAdi || "").toLowerCase().includes(search.toLowerCase());
        const matchFilter = !filterSurec || c.surec === filterSurec;
        return matchSearch && matchFilter;
      });

      const stats = {
        total: customers.length,
        yeni: customers.filter(c => c.surec === "Yeni").length,
        devam: customers.filter(c => c.surec === "Devam Ediyor").length,
        olumlu: customers.filter(c => c.surec === "Olumlu").length,
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
          {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}

          {/* Header */}
          <div style={{
            background: "linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%)",
            padding: "32px 40px 28px", color: "#fff", position: "relative", overflow: "hidden",
          }}>
            <div style={{ position: "absolute", top: -40, right: -40, width: 200, height: 200, borderRadius: "50%", background: "rgba(255,255,255,0.06)" }} />
            <div style={{ position: "absolute", bottom: -60, left: "30%", width: 300, height: 300, borderRadius: "50%", background: "rgba(255,255,255,0.03)" }} />
            <div style={{ position: "relative", zIndex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
                <div style={{
                  width: 40, height: 40, borderRadius: 10,
                  background: "rgba(255,255,255,0.2)", display: "flex",
                  alignItems: "center", justifyContent: "center", fontSize: 20
                }}>📋</div>
                <span style={{ fontSize: 28, fontWeight: 700, fontFamily: "'Playfair Display', serif", letterSpacing: -0.5 }}>
                  GoldstoneVisa
                </span>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginLeft: 52 }}>
                <p style={{ margin: 0, fontSize: 14, opacity: 0.8 }}>Müşteri ve vize süreç takip sistemi</p>
                <span style={{
                  background: loading ? "rgba(255,200,0,0.3)" : "rgba(0,255,150,0.25)",
                  padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600,
                  display: "inline-flex", alignItems: "center", gap: 4
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: loading ? "#FCD34D" : "#6EE7B7" }} />
                  {loading ? "Bağlanıyor..." : "Firebase Bağlı"}
                </span>
              </div>
            </div>
          </div>

          <div style={{ maxWidth: 1200, margin: "0 auto", padding: "24px 20px 40px", flex: 1, width: "100%" }}>

            {/* Stats */}
            <div style={{ display: "flex", gap: 16, marginBottom: 28, flexWrap: "wrap" }}>
              <StatCard label="Toplam Müşteri" value={stats.total} icon="👥" color="#6366F1" />
              <StatCard label="Yeni Başvuru" value={stats.yeni} icon="🆕" color="#0EA5E9" />
              <StatCard label="Devam Ediyor" value={stats.devam} icon="⏳" color="#F59E0B" />
              <StatCard label="Olumlu Sonuç" value={stats.olumlu} icon="✅" color="#10B981" />
            </div>

            {/* Toolbar */}
            <div style={{ display: "flex", gap: 12, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ flex: 1, minWidth: 200, position: "relative" }}>
                <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 16, color: "#94A3B8" }}>🔍</span>
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Müşteri ara..."
                  style={{
                    width: "100%", padding: "10px 12px 10px 36px", borderRadius: 12,
                    border: "1.5px solid #E2E8F0", background: "#fff", fontSize: 14, outline: "none"
                  }}
                />
              </div>
              <select value={filterSurec} onChange={e => setFilterSurec(e.target.value)} style={{
                padding: "10px 14px", borderRadius: 12, border: "1.5px solid #E2E8F0",
                background: "#fff", fontSize: 13, color: filterSurec ? "#1E293B" : "#94A3B8", cursor: "pointer"
              }}>
                <option value="">Tüm Süreçler</option>
                {DROPDOWN_OPTIONS.surec.map(s => <option key={s} value={s}>{s}</option>)}
              </select>
              <button onClick={handleExportExcel}
                style={{
                  padding: "10px 18px", borderRadius: 12, border: "1.5px solid #10B981",
                  background: "#ECFDF5", color: "#065F46", fontSize: 13, fontWeight: 600,
                  cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", gap: 6
                }}
                onMouseEnter={e => { e.currentTarget.style.background = "#D1FAE5"; }}
                onMouseLeave={e => { e.currentTarget.style.background = "#ECFDF5"; }}
              >
                📥 Excel'e Aktar
              </button>
              <button onClick={() => { setShowForm(!showForm); setEditId(null); setForm({ ...EMPTY_CUSTOMER }); }}
                style={{
                  padding: "10px 20px", borderRadius: 12, border: "none",
                  background: showForm ? "#EF4444" : "linear-gradient(135deg, #4F46E5, #7C3AED)",
                  color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer",
                  boxShadow: "0 2px 8px rgba(99,102,241,0.3)", transition: "all 0.2s"
                }}
              >
                {showForm ? "✕ İptal" : "+ Yeni Müşteri"}
              </button>
            </div>

            {/* Form */}
            {showForm && (
              <div ref={formRef} style={{
                background: "#fff", borderRadius: 20, padding: 28,
                boxShadow: "0 4px 24px rgba(0,0,0,0.06)", border: "1px solid #E8ECF4",
                marginBottom: 24, animation: "slideDown 0.3s ease"
              }}>
                <h3 style={{ margin: "0 0 20px", fontSize: 18, fontWeight: 700, color: "#1E293B" }}>
                  {editId ? "✏️ Müşteri Düzenle" : "➕ Yeni Müşteri Ekle"}
                </h3>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 18 }}>
                  <InputField label="Müşteri Adı" value={form.musteriAdi} onChange={v => updateForm("musteriAdi", v)} placeholder="Ad Soyad" icon="👤" />
                  <SelectField label="Müşteri Türü" value={form.musteriTuru} options={DROPDOWN_OPTIONS.musteriTuru} onChange={v => updateForm("musteriTuru", v)} icon="🏷" />
                  <SelectField label="Vize Türü" value={form.vizeTuru} options={DROPDOWN_OPTIONS.vizeTuru} onChange={v => updateForm("vizeTuru", v)} icon="📄" />
                  <SelectField label="Vize Alınacak Ülke" value={form.vizeUlke} options={DROPDOWN_OPTIONS.vizeUlke} onChange={v => updateForm("vizeUlke", v)} icon="🌍" />
                  <SelectField label="Bot Kullanılacak mı?" value={form.botKullanimi} options={DROPDOWN_OPTIONS.botKullanimi} onChange={v => updateForm("botKullanimi", v)} icon="🤖" />
                  <InputField label="Bot Bedeli" value={form.botBedeli} onChange={v => updateForm("botBedeli", v)} type="number" placeholder="₺" icon="💰" />
                  <SelectField label="Süreç" value={form.surec} options={DROPDOWN_OPTIONS.surec} onChange={v => updateForm("surec", v)} icon="📊" />
                  <SelectField label="Ödeme Bilgisi" value={form.odemeBilgisi} options={DROPDOWN_OPTIONS.odemeBilgisi} onChange={v => updateForm("odemeBilgisi", v)} icon="💳" />
                  <InputField label="Ödeme Tutarı" value={form.odemeTutari} onChange={v => updateForm("odemeTutari", v)} type="number" placeholder="₺" icon="💵" />
                </div>
                <div style={{ display: "flex", gap: 12, marginTop: 24, justifyContent: "flex-end" }}>
                  <button onClick={() => { setShowForm(false); setEditId(null); }} style={{
                    padding: "10px 24px", borderRadius: 10, border: "1.5px solid #E2E8F0",
                    background: "#fff", color: "#64748B", fontSize: 14, fontWeight: 600, cursor: "pointer"
                  }}>Vazgeç</button>
                  <button onClick={handleSave} disabled={saving} style={{
                    padding: "10px 28px", borderRadius: 10, border: "none",
                    background: saving ? "#94A3B8" : "linear-gradient(135deg, #4F46E5, #7C3AED)", color: "#fff",
                    fontSize: 14, fontWeight: 600, cursor: saving ? "wait" : "pointer",
                    boxShadow: "0 2px 8px rgba(99,102,241,0.3)", opacity: saving ? 0.7 : 1
                  }}>{saving ? "Kaydediliyor..." : editId ? "Güncelle" : "Kaydet"}</button>
                </div>
              </div>
            )}

            {/* Table */}
            <div style={{
              background: "#fff", borderRadius: 20, overflow: "hidden",
              boxShadow: "0 1px 6px rgba(0,0,0,0.04)", border: "1px solid #F1F5F9"
            }}>
              {loading ? <Spinner /> : (
                <>
                  <div style={{ overflowX: "auto" }}>
                    <table style={{ fontSize: 13 }}>
                      <thead>
                        <tr style={{ background: "#F8FAFC" }}>
                          {["#", "Müşteri Adı", "Müşteri Türü", "Vize Türü", "Ülke", "Bot", "Bot Bedeli", "Süreç", "Ödeme", "Tutar", "İşlem"].map((h, i) => (
                            <th key={i} style={{
                              padding: "14px 12px", textAlign: "left", fontWeight: 600,
                              color: "#64748B", fontSize: 11, letterSpacing: 0.5,
                              textTransform: "uppercase", borderBottom: "2px solid #F1F5F9",
                              whiteSpace: "nowrap"
                            }}>{h}</th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {filtered.length === 0 ? (
                          <tr>
                            <td colSpan={11} style={{ padding: 40, textAlign: "center", color: "#94A3B8" }}>
                              <div style={{ fontSize: 36, marginBottom: 8 }}>📭</div>
                              {customers.length === 0 ? "Henüz müşteri eklenmemiş. İlk müşterinizi ekleyin!" : "Kayıt bulunamadı"}
                            </td>
                          </tr>
                        ) : filtered.map((c, idx) => (
                          <tr key={c.id} style={{ borderBottom: "1px solid #F1F5F9", transition: "background 0.15s" }}
                            onMouseEnter={e => e.currentTarget.style.background = "#FAFAFF"}
                            onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                          >
                            <td style={{ padding: "12px", color: "#94A3B8", fontWeight: 500 }}>{idx + 1}</td>
                            <td style={{ padding: "12px", fontWeight: 600, color: "#1E293B" }}>{c.musteriAdi || "—"}</td>
                            <td style={{ padding: "12px", color: "#475569" }}>{c.musteriTuru || "—"}</td>
                            <td style={{ padding: "12px", color: "#475569" }}>{c.vizeTuru || "—"}</td>
                            <td style={{ padding: "12px", color: "#475569" }}>
                              {c.vizeUlke ? <span>🏳 {c.vizeUlke}</span> : "—"}
                            </td>
                            <td style={{ padding: "12px" }}>
                              {c.botKullanimi === "Evet" ? <span style={{ color: "#10B981" }}>✔</span> :
                               c.botKullanimi === "Hayır" ? <span style={{ color: "#EF4444" }}>✖</span> : "—"}
                            </td>
                            <td style={{ padding: "12px", color: "#475569" }}>{c.botBedeli ? `₺${c.botBedeli}` : "—"}</td>
                            <td style={{ padding: "12px" }}><Badge value={c.surec} colorMap={SUREC_COLORS} /></td>
                            <td style={{ padding: "12px", color: "#475569" }}>{c.odemeBilgisi || "—"}</td>
                            <td style={{ padding: "12px", fontWeight: 600, color: "#1E293B" }}>{c.odemeTutari ? `₺${c.odemeTutari}` : "—"}</td>
                            <td style={{ padding: "12px", whiteSpace: "nowrap" }}>
                              <button onClick={() => handleEdit(c)} title="Düzenle" style={{
                                background: "none", border: "none", cursor: "pointer", fontSize: 16,
                                padding: "4px 6px", borderRadius: 6, transition: "background 0.15s"
                              }}
                                onMouseEnter={e => e.currentTarget.style.background = "#EEF2FF"}
                                onMouseLeave={e => e.currentTarget.style.background = "none"}
                              >✏️</button>
                              <button onClick={() => handleDelete(c.id)} title="Sil" style={{
                                background: "none", border: "none", cursor: "pointer", fontSize: 16,
                                padding: "4px 6px", borderRadius: 6, transition: "background 0.15s"
                              }}
                                onMouseEnter={e => e.currentTarget.style.background = "#FEE2E2"}
                                onMouseLeave={e => e.currentTarget.style.background = "none"}
                              >🗑️</button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{
                    padding: "12px 20px", borderTop: "1px solid #F1F5F9",
                    fontSize: 12, color: "#94A3B8", display: "flex", justifyContent: "space-between"
                  }}>
                    <span>{filtered.length} / {customers.length} kayıt gösteriliyor</span>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Footer */}
          <div style={{
            background: "linear-gradient(135deg, #1E1B4B 0%, #312E81 100%)",
            padding: "28px 40px", color: "#fff", textAlign: "center",
            borderTop: "3px solid #6366F1"
          }}>
            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700, marginBottom: 8 }}>
              GoldstoneVisa
            </div>
            <div style={{ fontSize: 13, opacity: 0.7, marginBottom: 12 }}>
              Müşteri ve vize süreç takip sistemi
            </div>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 8,
              background: "rgba(255,255,255,0.08)", padding: "8px 20px",
              borderRadius: 30, fontSize: 13
            }}>
              <span style={{ fontSize: 16 }}>✉️</span>
              <a href="mailto:info@goldstonevisa.com" style={{
                color: "#A5B4FC", textDecoration: "none", fontWeight: 500
              }}
                onMouseEnter={e => e.currentTarget.style.color = "#C7D2FE"}
                onMouseLeave={e => e.currentTarget.style.color = "#A5B4FC"}
              >
                info@goldstonevisa.com
              </a>
            </div>
            <div style={{ fontSize: 11, opacity: 0.4, marginTop: 16 }}>
              © 2026 GoldstoneVisa — Tüm hakları saklıdır.
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<CRMApp />);
  </script>
</body>
</html>
